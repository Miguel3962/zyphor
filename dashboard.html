<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus & Discipline - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="close-sidebar" id="closeSidebar">×</button>
        </div>
        <div class="sidebar-content">
            <h3>Configurações</h3>
            <ul>
                <li><button>Editar Perfil</button></li>
                <li><button>Notificações</button></li>
                <li><button>Temas</button></li>
                <li><button>Privacidade</button></li>
                <li><hr></li>
                <li><button id="logoutBtnSidebar">Sair</button></li>
            </ul>
        </div>
    </div>
    <div class="overlay" id="overlay"></div>
    <div class="dashboard-wrapper">
        <div class="user-card-screen-left" id="userCard">
            <div class="avatar-circle" id="avatarCircle">?</div>
            <div class="user-info">
                <h3 id="userName">Carregando...</h3>
            </div>
        </div>
        <div class="dashboard-container">
<div class="dashboard-header">
                <h1>🧠 Focus & Discipline</h1>
            </div>

            <div class="welcome-section">
                <h2 id="welcomeUser">Bem-vindo!</h2>

                <div class="features">
                </div>


            </div>

            
            <!-- Metas Section -->
            <div class="metas-section">
                <h3>Minhas Metas</h3>
                <p>Defina e acompanhe suas metas diárias de foco</p>


                <div class="meta-input-group">
                    <input type="text" id="newMetaInput" placeholder="Digite sua meta" maxlength="200">

<button id="addMetaBtn" class="add-btn small-btn">Adicionar</button>

                </div>



                <ul id="metasList" class="metas-list"></ul>
            </div>
            
            <!-- Weekly Stats Card -->
            <div class="stats-card">
                <div class="card-header">
                    <h3>📊 Progresso Semanal</h3>
                    <p>Metas completadas por dia</p>
                </div>
                <canvas id="weeklyChart" height="300"></canvas>
            </div>
            
        
            
        </div>
    </div>
    <script>

        // Check session
        const userSession = JSON.parse(localStorage.getItem('userSession') || '{}');
        if (!userSession.loggedIn) {
            window.location.href = 'index.html';
        }
        
        // Set user info and avatar
        const name = userSession.name || userSession.email || 'Usuário';
        document.getElementById('welcomeUser').textContent = `Bem-vindo, ${name}!`;
        document.getElementById('userName').textContent = name;
        const firstLetter = name.charAt(0).toUpperCase() || '?';
        document.getElementById('avatarCircle').textContent = firstLetter;

        // Sidebar functionality
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const userCard = document.getElementById('userCard');
        const closeSidebar = document.getElementById('closeSidebar');
        const logoutBtnSidebar = document.getElementById('logoutBtnSidebar');

        userCard.addEventListener('click', function() {
            sidebar.classList.add('active');
            overlay.classList.add('active');
        });

        closeSidebar.addEventListener('click', closeSidebarFunc);
        overlay.addEventListener('click', closeSidebarFunc);

        function closeSidebarFunc() {
            sidebar.classList.remove('active');
            overlay.classList.remove('active');
        }

        logoutBtnSidebar.addEventListener('click', function() {
            localStorage.removeItem('userSession');
            window.location.href = 'index.html';
        });

// Removed main logout button (sidebar has it)

        // Style vars
        document.body.style.fontFamily = "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif";
        document.body.style.background = "linear-gradient(135deg, #000000 0%, #1a1a1a 50%, #0f0f0f 100%)";
        document.body.style.minHeight = "100vh";
        document.body.style.margin = "0";
        document.body.style.position = "relative";
        document.body.style.color = "#f0f0f0";
        document.body.style.overflowX = "hidden";

        // Metas functionality
let metas = JSON.parse(localStorage.getItem('metas') || '[]');
let editingIndex = -1;
        
        const newMetaInput = document.getElementById('newMetaInput');

        const metasList = document.getElementById('metasList');
        
        function renderMetas() {
            metasList.innerHTML = '';

            metas.forEach((meta, index) => {
                const li = document.createElement('li');
                li.className = 'meta-item';
                li.dataset.index = index;
                if (editingIndex === index) {
                    li.innerHTML = `
                        <input type="text" class="meta-edit-input" value="${meta}" />
                        <button class="save-meta" onclick="saveMeta(${index})">✓</button>
                        <button class="cancel-edit" onclick="cancelEdit()">✗</button>
                    `;
                } else {
                    li.innerHTML = `
                        <span class="meta-text">${meta}</span>
                        <button class="complete-meta" onclick="completeMeta(${index})">✔</button>
                        <button class="edit-meta" onclick="editMeta(${index})">✎</button>
                        <button class="delete-meta" onclick="deleteMeta(${index})">×</button>
                    `;
                }
                metasList.appendChild(li);
            });
            renderChart(); // Always render chart
        }

        function completeMeta(index) {
            // Mark as completed without removing from list
            let completedMetas = JSON.parse(localStorage.getItem('completedMetas') || '[]');
            completedMetas.unshift(metas[index]);
            localStorage.setItem('completedMetas', JSON.stringify(completedMetas));
            
            // Update weekly stats
            let weeklyStats = JSON.parse(localStorage.getItem('weeklyStats') || '[0,0,0,0,0,0,0]');
            const today = new Date().getDay(); // 0=Dom, 6=Sáb
            weeklyStats[today]++;
            localStorage.setItem('weeklyStats', JSON.stringify(weeklyStats));
            renderChart();
            renderMetas();
        }
        
        function renderChart() {
            const ctx = document.getElementById('weeklyChart').getContext('2d');
            const weeklyStats = JSON.parse(localStorage.getItem('weeklyStats') || '[0,0,0,0,0,0,0]');
            if (weeklyStats.every(function(val) { return val === 0; })) {
                weeklyStats = [3,2,5,1,4,0,2];
            }
            const days = ['seg', 'ter', 'qua', 'qui', 'sex', 'sab', 'dom'];

            if (window.weeklyChart) window.weeklyChart.destroy();

            window.weeklyChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: days,
                    datasets: [{
                        data: weeklyStats,
                        backgroundColor: 'linear-gradient(45deg, #D4AF37, #E6C478)',
                        borderColor: '#D4AF37',
                        borderWidth: 2,
                        borderRadius: 12,
                        borderSkipped: false,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(212,175,55,0.1)' },
                            ticks: { color: '#f0f0f0', stepSize: 1 }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#D4AF37' }
                        }
                    },
                    animation: {
                        duration: 1200,
                    }
                }
            });
        }
        
        function addMeta() {
            const text = newMetaInput.value.trim();
            if (text) {
                metas.unshift(text);
                localStorage.setItem('metas', JSON.stringify(metas));
                newMetaInput.value = '';
                renderMetas();
            }
        }
        
        function deleteMeta(index) {
            const modal = document.createElement('div');
            modal.id = 'deleteConfirmModal';
            modal.style.cssText = `
                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center;
                z-index: 1000; backdrop-filter: blur(5px);
            `;
            modal.innerHTML = `
                <div style="
                    background: linear-gradient(135deg, #1a1a1a, #000); 
                    border: 2px solid #ff4444; border-radius: 20px; padding: 40px; 
                    max-width: 400px; text-align: center; box-shadow: 0 20px 40px rgba(255,68,68,0.3);
                ">
                    <h3 style="color: #ff4444; margin-bottom: 20px;">⚠️ Tem certeza?</h3>
                    <p style="color: #f0f0f0; line-height: 1.5; margin-bottom: 30px;">
                        Deseja realmente <strong>excluir</strong> esta meta? 
                        <br><small>Esta ação não pode ser desfeita.</small>
                    </p>
                    <div style="display: flex; gap: 15px; justify-content: center;">
                        <button id="confirmDelete" onclick="confirmDelete(${index})" style="
                            background: #ff4444; color: white; border: none; padding: 12px 24px; 
                            border-radius: 25px; cursor: pointer; font-weight: 600; 
                            transition: all 0.3s; min-width: 100px;
                        ">Excluir</button>
                        <button onclick="closeDeleteModal()" style="
                            background: linear-gradient(45deg, #D4AF37, #F2D492); color: #000; 
                            border: none; padding: 12px 24px; border-radius: 25px; 
                            cursor: pointer; font-weight: 600; transition: all 0.3s; min-width: 100px;
                        ">Cancelar</button>
                    </div>
                    <button onclick="closeDeleteModal()" style="
                        position: absolute; top: 15px; right: 15px; width: 35px; height: 35px; 
                        border-radius: 50%; background: #ff4444; color: white; border: none; 
                        font-size: 20px; font-weight: bold; cursor: pointer;
                    ">×</button>
                </div>
            `;
            document.body.appendChild(modal);
        }

        function confirmDelete(index) {
            metas.splice(index, 1);
            localStorage.setItem('metas', JSON.stringify(metas));
            closeDeleteModal();
            renderMetas();
        }

        function closeDeleteModal() {
            const modal = document.getElementById('deleteConfirmModal');
            if (modal) modal.remove();
        }
        
        const addMetaBtn = document.getElementById('addMetaBtn');
        addMetaBtn.addEventListener('click', addMeta);
        newMetaInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addMeta();
        });
        
// Edit functions
        function editMeta(index) {
            editingIndex = index;
            renderMetas();
        }

        function saveMeta(index) {
            const input = metasList.children[index].querySelector('.meta-edit-input');
            const newText = input.value.trim();
            if (newText) {
                metas[index] = newText;
                localStorage.setItem('metas', JSON.stringify(metas));
            }
            editingIndex = -1;
            renderMetas();
        }

        function cancelEdit() {
            editingIndex = -1;
            renderMetas();
        }

        // Initial render
        renderMetas();

    </script>

        }

        #newMetaInput {
